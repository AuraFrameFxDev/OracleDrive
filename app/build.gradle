plugins {
    alias(libs.plugins.android.application)
    alias(libs.plugins.kotlin.android)
    alias(libs.plugins.kotlin.parcelize)
    id 'kotlin-kapt'
    id 'com.google.gms.google-services'  // Google Services plugin
    id 'com.google.firebase.crashlytics'  // Firebase Crashlytics
    id 'com.google.firebase.firebase-perf'  // Firebase Performance Monitoring
}

android {
    namespace 'com.genesis.ai.app'
    compileSdk 35
    
    buildFeatures {
        viewBinding true
        buildConfig true
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }
    
    packagingOptions {
        // Exclude unnecessary files from the APK
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/license.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/NOTICE.txt'
        exclude 'META-INF/notice.txt'
        exclude 'META-INF/ASL2.0'
        exclude 'META-INF/AL2.0'
        exclude 'META-INF/LGPL2.1'
        
        // Handle native libraries
        jniLibs {
            useLegacyPackaging = true  // Use the old packaging system for native libs
        }
    }

    defaultConfig {
        applicationId "com.genesis.ai.app"
        minSdk 26  // Android 8.0 (Oreo)
        targetSdk 35  // Android 15
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
        testApplicationId "com.genesis.ai.app.test"
        vectorDrawables.useSupportLibrary = true

        // Enable multidex support for older devices
        multiDexEnabled true
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"  // This adds .debug to the package name
            debuggable true
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    // Ensure consistent package names across build variants
    applicationVariants.all { variant ->
        variant.outputs.all {
            outputFileName = "app-${variant.baseName}-${variant.versionName}.apk"
        }
    }

    compileOptions {
        // Flag to enable support for the new language APIs
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
        freeCompilerArgs += [
                '-Xjvm-default=all',
                '-opt-in=kotlin.RequiresOptIn',
                '-Xcontext-receivers'
        ]
    }

    buildFeatures {
        viewBinding true
        buildConfig true
    }

    buildTypes.configureEach {
        // Configure build types here if needed
    }

    packagingOptions {
        resources {
            excludes += [
                    '/META-INF/{AL2.0,LGPL2.1}',
                    'META-INF/DEPENDENCIES',
                    'META-INF/LICENSE',
                    'META-INF/LICENSE.txt',
                    'META-INF/license.txt',
                    'META-INF/NOTICE',
                    'META-INF/NOTICE.txt',
                    'META-INF/notice.txt',
                    'META-INF/ASL2.0'
            ]
        }
    }

    androidResources {
        additionalParameters = ['--no-version-vectors']
    }

    // Enable ViewBinding for all build variants
    buildFeatures {
        viewBinding true
    }
}

configurations.configureEach {
    resolutionStrategy {
        // Force specific versions if needed
        // force 'androidx.core:core-ktx:1.16.0'
        // force 'androidx.appcompat:appcompat:1.7.0'

        // Enable dependency verification (optional)
        // failOnVersionConflict()
    }
}

dependencies {
    // Kotlin
    implementation libs.kotlin.stdlib
    implementation libs.coroutines.android
    implementation libs.coroutines.play.services
    
    // Firebase
    implementation platform(libs.firebase.bom)
    implementation libs.firebase.analytics
    implementation libs.firebase.crashlytics
    implementation libs.firebase.perf
    implementation libs.firebase.messaging
    implementation libs.firebase.auth
    implementation libs.firebase.firestore

    // Navigation
    implementation libs.navigation.fragment
    implementation libs.navigation.ui

    // Core AndroidX
    implementation libs.core.ktx
    implementation libs.appcompat
    implementation libs.material
    implementation libs.constraintlayout
    implementation libs.recyclerview
    implementation libs.cardview
    implementation libs.legacy.support
    implementation libs.multidex

    // Lifecycle
    implementation libs.lifecycle.viewmodel
    implementation libs.lifecycle.livedata
    implementation libs.lifecycle.runtime
    implementation libs.lifecycle.common

    // Desugaring
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'

    // Retrofit
    implementation libs.retrofit
    implementation libs.retrofit.converter.gson
    implementation libs.okhttp
    implementation libs.okhttp.logging

    // Testing
    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
    // Add WorkManager for background tasks if needed
    // implementation 'androidx.work:work-runtime-ktx:2.9.0'
}