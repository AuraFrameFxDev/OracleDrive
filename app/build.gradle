plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'kotlin-parcelize'
    id 'kotlin-kapt'
    id 'com.google.gms.google-services'  // Google Services plugin
    id 'com.google.firebase.crashlytics'  // Firebase Crashlytics
    id 'com.google.firebase.firebase-perf'  // Firebase Performance Monitoring
}

android {
    namespace = 'com.genesis.ai.app'
    compileSdk = 35

    defaultConfig {
        applicationId = "com.genesis.ai.app"
        minSdk = 26
        targetSdk = 34  // Latest stable Android version
        versionCode = 1
        versionName = "1.0"
        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
        vectorDrawables.useSupportLibrary = true

        // Enable multidex support for older devices
        multiDexEnabled true
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles(getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro')
            signingConfig signingConfigs.debug  // Temporary for testing
        }
        debug {
            minifyEnabled false
            debuggable true
            applicationIdSuffix ".debug"
        }
    }

    compileOptions {
        // Flag to enable support for the new language APIs
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
        freeCompilerArgs += [
                '-Xjvm-default=all',
                '-opt-in=kotlin.RequiresOptIn',
                '-Xcontext-receivers'
        ]
    }

    buildFeatures {
        viewBinding true
        buildConfig true
    }

    buildTypes.configureEach {
        // Configure build types here if needed
    }

    packagingOptions {
        resources {
            excludes += [
                    '/META-INF/{AL2.0,LGPL2.1}',
                    'META-INF/DEPENDENCIES',
                    'META-INF/LICENSE',
                    'META-INF/LICENSE.txt',
                    'META-INF/license.txt',
                    'META-INF/NOTICE',
                    'META-INF/NOTICE.txt',
                    'META-INF/notice.txt',
                    'META-INF/ASL2.0'
            ]
        }
    }

    androidResources {
        additionalParameters = ['--no-version-vectors']
    }

    // Enable ViewBinding for all build variants
    buildFeatures {
        viewBinding true
    }
}

configurations.configureEach {
    resolutionStrategy {
        // Force specific versions if needed
        force 'androidx.core:core-ktx:1.16.0'
        force 'androidx.appcompat:appcompat:1.7.0'

        // Enable dependency verification (optional)
        // failOnVersionConflict()
    }
}

dependencies {
    // Firebase BoM (Bill of Materials)
    implementation platform('com.google.firebase:firebase-bom:33.14.0')

    // Firebase dependencies (no versions required when using BoM)
    implementation 'com.google.firebase:firebase-analytics-ktx'
    implementation 'com.google.firebase:firebase-crashlytics-ktx'
    implementation 'com.google.firebase:firebase-perf-ktx'
    implementation 'com.google.firebase:firebase-messaging-ktx'  // For FCM
    implementation 'com.google.firebase:firebase-auth-ktx'  // For Authentication
    implementation 'com.google.firebase:firebase-firestore-ktx'  // For Firestore
    // Kotlin
    implementation 'org.jetbrains.kotlin:kotlin-stdlib:2.1.21'
    implementation 'org.jetbrains.kotlin:kotlin-reflect:2.1.21'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.0'
    // Matches Kotlin version
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'

    // AndroidX
    implementation 'androidx.core:core-ktx:1.12.0'  // Latest stable
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.0'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.cardview:cardview:1.0.0'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
    implementation 'androidx.multidex:multidex:2.0.1'  // For multidex support

    // Lifecycle
    def lifecycle_version = "2.7.0"
    implementation "androidx.lifecycle:lifecycle-viewmodel-ktx:$lifecycle_version"
    implementation "androidx.lifecycle:lifecycle-livedata-ktx:$lifecycle_version"
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:$lifecycle_version"
    implementation "androidx.lifecycle:lifecycle-common-java8:$lifecycle_version"

    // Retrofit
    implementation 'com.squareup.retrofit2:retrofit:2.12.0'  // Stable version
    implementation 'com.squareup.retrofit2:converter-gson:2.12.0'  // Matches Retrofit version
    implementation 'com.squareup.okhttp3:okhttp:5.0.0-alpha.14'
    implementation 'com.squareup.okhttp3:logging-interceptor:5.0.0-alpha.14'

    // Testing
    testImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test.ext:junit:1.2.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'  // Latest stable version

    // Add WorkManager for background tasks if needed
    // implementation 'androidx.work:work-runtime-ktx:2.9.0'
}