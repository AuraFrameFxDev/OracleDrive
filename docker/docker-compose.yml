version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      # Add other environment variables here
    volumes:
      - .:/app
    # Uncomment the following lines if you need to use the host network
    # network_mode: "host"
    # Uncomment the following if you need to specify a custom command
    # command: python server/app.py

  # Uncomment and modify the following if you need a database
  # db:
  #   image: postgres:13
  #   environment:
  #     - POSTGRES_USER=user
  #     - POSTGRES_PASSWORD=password
  #     - POSTGRES_DB=gencomm
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data/

# Uncomment if you add a database service
# volumes:
#   postgres_data:
