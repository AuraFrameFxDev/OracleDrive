// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Google Services plugin (for Firebase and other Google services)
        classpath 'com.google.gms:google-services:4.4.2'

        // Firebase plugins
        classpath 'com.google.firebase:firebase-crashlytics-gradle:3.0.3'
        classpath 'com.google.firebase:perf-plugin:1.4.2'
    }
}

plugins {
    id 'com.android.application' version '8.10.0' apply false
    id 'com.android.library' version '8.10.0' apply false
    id 'org.jetbrains.kotlin.android' version '2.1.21' apply false
    id 'org.jetbrains.kotlin.plugin.parcelize' version '2.1.21' apply false
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // Configure all projects with common settings
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            android {
                compileSdk = 35

                compileOptions {
                    sourceCompatibility = JavaVersion.VERSION_17
                    targetCompatibility = JavaVersion.VERSION_17
                }

                kotlinOptions {
                    jvmTarget = '17'
                }
            }
        }
    }
}

// Clean task to remove the build directory
tasks.register('clean', Delete) {
    delete rootProject.layout.buildDirectory
}