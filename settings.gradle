// Plugin management must be the first block
pluginManagement {
    repositories {
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

// Define the root project name
rootProject.name = 'GenesisAndroidApp'

// Include the app module
include ':app'

// Enable version catalogs
enableFeaturePreview 'VERSION_CATALOGS'

// Configure dependency resolution
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    
    repositories {
        google()
        mavenCentral()
    }
    
    // Version catalog must be defined here
    versionCatalogs {
        libs {
            from(files('gradle/libs.versions.toml'))
        }
    }
}
